<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topography — Sorcha Hamilton</title>
    <meta name="description" content="Topography, a solo exhibition by Sorcha Hamilton. Friday 1st May 2026, Ballinasloe Library, Co. Galway.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', sans-serif;
            background: #fff;
            color: #333;
            line-height: 1.6;
        }

        .topnav {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 2rem 0;
        }

        .topnav a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            transition: color 0.2s ease;
        }

        .topnav a:hover {
            color: #000;
        }

        .header {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s forwards;
        }

        .eyebrow {
            font-size: 0.85rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 4rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .meta {
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: #555;
        }

        .meta-line {
            margin-bottom: 0.25rem;
        }

        .meta a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid rgba(85, 85, 85, 0.3);
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .meta a:hover {
            color: #000;
            border-bottom-color: #000;
        }

        .poster-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem 4rem;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
        }

        .poster-section.visible {
            animation: fadeIn 1s forwards;
        }

        .poster-section img {
            max-width: 480px;
            width: 100%;
            height: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border-radius: 2px;
        }

        .documentation {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem 6rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .documentation.visible {
            animation: fadeIn 1s forwards;
        }

        .documentation h2 {
            font-size: 1rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #888;
            font-weight: 400;
            margin-bottom: 2rem;
            text-align: center;
        }

        .documentation-placeholder {
            text-align: center;
            padding: 4rem 2rem;
            border: 1px dashed rgba(0, 0, 0, 0.15);
            border-radius: 2px;
            color: #888;
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .photo-grid img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2px;
        }

        .footer {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.75rem;
            }
            .header {
                padding: 3rem 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="topnav">
        <a href="../index.html">← Sorcha Hamilton</a>
    </nav>

    <header class="header">
        <p class="eyebrow">Solo Exhibition</p>
        <h1>Topography</h1>
        <div class="meta">
            <div class="meta-line">Friday 1<sup>st</sup> May 2026</div>
            <div class="meta-line"><a href="https://maps.app.goo.gl/E6MhzCzUdmdTq9AL8" target="_blank" rel="noopener">Ballinasloe Library, Co. Galway</a></div>
        </div>
    </header>

    <section class="poster-section">
        <img src="../images/topography-poster.webp" alt="Topography by Sorcha Hamilton — exhibition poster">
    </section>

    <section class="documentation">
        <h2>Documentation</h2>
        <div class="documentation-placeholder">
            Photographs from the exhibition will appear here following the opening on 1<sup>st</sup> May.
        </div>
    </section>

    <footer class="footer">
        <p>Sorcha Hamilton · 2026</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.poster-section, .documentation').forEach(el => {
            observer.observe(el);
        });
    </script>
</body>
</html>
